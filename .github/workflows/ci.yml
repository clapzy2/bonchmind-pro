name: CI

on:
  push:
    branches: [main, cleanup-product-version]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Alembic migration applies cleanly
        run: |
          mkdir -p data
          DATABASE_URL="sqlite:///./data/_ci_migration_check.db" python -m alembic upgrade head
          rm -f data/_ci_migration_check.db

      - name: Run tests
        run: python -m pytest tests/ -q

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  compose:
    name: Compose config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Lightweight structural validation of docker-compose.yml — interpolates
      # env and parses the file without building images. Dummy secrets satisfy
      # the required ${JWT_SECRET_KEY:?...} interpolation.
      - name: Validate docker-compose.yml
        run: docker compose config -q
        env:
          JWT_SECRET_KEY: ci-dummy-secret
          POSTGRES_PASSWORD: ci-dummy
          API_KEY: ci-dummy
